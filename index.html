<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLK INVESTMENTS - Login</title>
<style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    color: #e2e8f0;
    display: grid;
    place-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 1rem;
  }
.container {
    background: rgba(30, 41, 59, 0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(148, 163, 184, 0.2);
    padding: 2rem;
    border-radius: 12px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }
h2 {
    text-align: center;
    margin: 0 0 1.5rem;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 50%, #7dd3fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
  }
.tabs { display: flex; margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; }
.tab {
    flex: 1;
    padding: 0.75rem;
    background: rgba(51, 65, 85, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
  }
.tab.active { background: rgba(56, 189, 248, 0.9); color: #0f172a; font-weight: 600; }
  input, select {
    width: 100%;
    padding: 0.75rem;
    margin: 0.4rem 0;
    background: rgba(51, 65, 85, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(71, 85, 105, 0.5);
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 16px;
  }
  input:focus, select:focus { outline: 2px solid #38bdf8; border-color: transparent; }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
  }
  button {
    width: 100%;
    padding: 0.85rem;
    margin-top: 1rem;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    color: #0f172a;
    font-weight: 600;
    cursor: pointer;
    font-size: 16px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
.password-wrapper {
    position: relative;
    margin: 0.4rem 0;
  }
.password-wrapper input {
    margin: 0;
    padding-right: 2.75rem;
  }
.peek-btn {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    padding: 0;
    margin: 0;
    width: auto;
    font-size: 1.1rem;
    line-height: 1;
  }
.peek-btn:hover {
    color: #38bdf8;
  }
.msg { text-align: center; margin-top: 1rem; min-height: 24px; font-weight: 500; }
.error { color: #f87171; }
.success { color: #4ade80; }
.hidden { display: none; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.form-grid input,.form-grid select { margin: 0.25rem 0; }
  label { font-size: 0.85rem; color: #94a3b8; margin: 0.5rem 0 0.1rem; display: block; }
</style>
</head>
<body>
<div class="container">
  <h2>JLK INVESTMENTS</h2>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Login</button>
    <button class="tab" onclick="showTab('signup')">Sign Up</button>
  </div>

  <form id="loginForm">
    <label>Username</label>
    <input type="text" id="loginUsername" placeholder="Username" required>
    <label>Password</label>
    <div class="password-wrapper">
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="button" class="peek-btn" onclick="togglePassword('loginPassword', this)">👁️</button>
    </div>
    <button type="submit">Login</button>
  </form>

  <form id="signupForm" class="hidden">
    <div class="form-grid">
      <div>
        <label>First Name</label>
        <input type="text" id="signupFirstName" placeholder="First Name" required>
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" id="signupLastName" placeholder="Last Name" required>
      </div>
    </div>

    <label>Username</label>
    <input type="text" id="signupUsername" placeholder="Username" required>

    <label>Password</label>
    <div class="password-wrapper">
      <input type="password" id="signupPassword" placeholder="Password" required>
      <button type="button" class="peek-btn" onclick="togglePassword('signupPassword', this)">👁️</button>
    </div>

    <label>Email</label>
    <input type="email" id="signupEmail" placeholder="Email" required>

    <label>Phone Number</label>
    <input type="tel" id="signupPhone" placeholder="e.g. 758954766" required>

    <div class="form-grid">
      <div>
        <label>Date of Birth</label>
        <input type="date" id="signupDob" required>
      </div>
      <div>
        <label>Gender</label>
        <select id="signupGender" required>
          <option value="">Select</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
    </div>

    <label>District</label>
    <input type="text" id="signupDistrict" placeholder="e.g. Kampala" required>

    <button type="submit">Create Account</button>
  </form>

  <div id="msg" class="msg"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbybF9408yjjGOX9MorN4jpHtftuKPDBxfN0sczbnHvqJ2WiwYk9ReSFdJHXfrd2XJsA/exec'; 

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('form').forEach(f => f.classList.add('hidden'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Form').classList.remove('hidden');
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'msg';
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

async function postData(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  return res.json();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = 'Logging in...';
  msg.className = 'msg';

  try {
    const data = await postData({
      action: 'login',
      username: document.getElementById('loginUsername').value.trim(),
      password: document.getElementById('loginPassword').value
    });

    if (data.status === 'success') {
      msg.className = 'msg success';
      msg.textContent = `Welcome ${data.user.firstName}! Balance: ${data.user.balance}`;
      localStorage.setItem('jlkUser', JSON.stringify(data.user));
      // window.location.href = '/dashboard.html'; // redirect when ready
    } else {
      msg.className = 'msg error';
      msg.textContent = data.message;
    }
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = 'Network error. Try again.';
  }
  btn.disabled = false;
});

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = 'Creating account...';
  msg.className = 'msg';

  try {
    const data = await postData({
      action: 'signup',
      firstName: document.getElementById('signupFirstName').value.trim(),
      lastName: document.getElementById('signupLastName').value.trim(),
      username: document.getElementById('signupUsername').value.trim(),
      password: document.getElementById('signupPassword').value,
      email: document.getElementById('signupEmail').value.trim(),
      phone: document.getElementById('signupPhone').value.trim(),
      dob: document.getElementById('signupDob').value,
      gender: document.getElementById('signupGender').value,
      district: document.getElementById('signupDistrict').value.trim()
    });

    if (data.status === 'success') {
      msg.className = 'msg success';
      msg.textContent = 'Account created! You can login now.';
      e.target.reset();
      setTimeout(() => showTab('login'), 1500);
    } else {
      msg.className = 'msg error';
      msg.textContent = data.message;
    }
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = 'Network error. Try again.';
  }
  btn.disabled = false;
});

// Set max date to 18 years ago for DOB
document.getElementById('signupDob').max = new Date(new Date().setFullYear(new Date().getFullYear() - 18)).toISOString().split('T')[0];
</script>
</body>
</html>
